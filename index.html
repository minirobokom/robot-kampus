<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Robokom - Robot Kiosk</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #05070a;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
            transition: opacity 0.8s ease;
        }

        .robot-face {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 50px;
        }

        .eyes-container {
            display: flex;
            gap: 70px;
        }

        .eye {
            width: 140px;
            height: 140px;
            background-color: #3fb950;
            border-radius: 50%;
            box-shadow: 0 0 40px #3fb950;
            transition: all 0.3s ease;
        }

        .eye.blink {
            height: 8px !important;
            margin-top: 66px;
        }

        body.sleep .eye {
            height: 16px;
            border-radius: 20px;
            margin-top: 62px;
            background-color: #238636;
            box-shadow: 0 0 15px #238636;
        }

        body.sleep { opacity: 0.35; }

        .eye.talking {
            background-color: #58a6ff;
            box-shadow: 0 0 50px #58a6ff;
        }

        .eye.thinking {
            background-color: #d29922;
            box-shadow: 0 0 40px #d29922;
        }

        .mouth {
            width: 100px;
            height: 12px;
            background-color: #58a6ff;
            border-radius: 10px;
            box-shadow: 0 0 20px #58a6ff;
            transition: all 0.1s ease;
            opacity: 0.3;
        }

        .mouth.talking {
            opacity: 1;
            animation: mouthMove 0.2s infinite alternate ease-in-out;
        }

        @keyframes mouthMove {
            0% { height: 10px; width: 90px; border-radius: 10px; }
            100% { height: 60px; width: 120px; border-radius: 30px; }
        }
    </style>
</head>
<body onclick="wakeUp()">

    <div class="robot-face">
        <div class="eyes-container">
            <div class="eye" id="leftEye"></div>
            <div class="eye" id="rightEye"></div>
        </div>
        <div class="mouth" id="mouth"></div>
    </div>

    <script>
        const GEMINI_API_KEY = "PASTE_GEMINI_API_KEY_ANDA_DI_SINI";

        // DATA FAQ LOKAL (Instan tanpa unduh internet)
        const localFAQ = [
            { keywords: ["nama", "siapa kamu"], answer: "Halo! Nama saya Mini Robokom, robot pintar siap membantu kamu." },
            { keywords: ["lokasi", "rektorat", "dimana"], answer: "Gedung Rektorat berada di sebelah utara lapangan utama kampus." },
            { keywords: ["pendaftaran", "pmb", "daftar"], answer: "Informasi pendaftaran mahasiswa baru dapat diakses di situs pmb.kampus.ac.id." }
        ];

        let isSpeaking = false;
        let isProcessing = false;
        let sleepTimer;

        // Auto Berkedip Mata
        setInterval(() => {
            if (!isSpeaking && !document.body.classList.contains('sleep')) {
                const eyes = document.querySelectorAll('.eye');
                eyes.forEach(e => e.classList.add('blink'));
                setTimeout(() => eyes.forEach(e => e.classList.remove('blink')), 200);
            }
        }, 4000);

        function resetSleepTimer() {
            document.body.classList.remove('sleep');
            clearTimeout(sleepTimer);
            sleepTimer = setTimeout(() => {
                if (!isSpeaking && !isProcessing) {
                    document.body.classList.add('sleep');
                }
            }, 15000);
        }

        function wakeUp() {
            resetSleepTimer();
            startListening();
        }

        // Speech Recognition Optimasi
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'id-ID';
            recognition.continuous = false; // Diubah ke false agar lebih responsif di Android
            recognition.interimResults = false;

            recognition.onresult = async (event) => {
                if (isSpeaking || isProcessing) return;
                
                const userSpeech = event.results[0][0].transcript.trim();
                if (userSpeech.length > 1) {
                    wakeUp();
                    await prosesPertanyaan(userSpeech);
                }
            };

            recognition.onend = () => {
                // Auto restart listening jika robot tidak sedang bicara / berpikir
                if (!isSpeaking && !isProcessing && !document.body.classList.contains('sleep')) {
                    try { recognition.start(); } catch(e){}
                }
            };
        }

        function startListening() {
            if (recognition && !isSpeaking && !isProcessing) {
                try { recognition.start(); } catch(e){}
            }
        }

        // Logika Respon Cepat
        async function prosesPertanyaan(inputTeks) {
            isProcessing = true;
            setEyesState('thinking');
            const inputLower = inputTeks.toLowerCase();

            // 1. Cek Data FAQ Lokal Terlebih Dahulu (Hanya butuh 0.001 detik)
            let jawaban = null;
            for (let item of localFAQ) {
                for (let kw of item.keywords) {
                    if (inputLower.includes(kw)) {
                        jawaban = item.answer;
                        break;
                    }
                }
                if (jawaban) break;
            }

            // 2. Jika Tidak Ada di FAQ, Panggil Gemini AI (Fast Flash Model)
            if (!jawaban) {
                jawaban = await tanyaGemini(inputTeks);
            }

            isProcessing = false;
            bicara(jawaban);
        }

        // Pemanggilan API Gemini 1.5 Flash
        async function tanyaGemini(prompt) {
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        system_instruction: {
                            parts: [{ text: "Kamu adalah Mini Robokom, robot pintar kiosk kampus. Jawablah SELALU dalam Bahasa Indonesia, sangat singkat, ramah, dan maksimal 2 kalimat." }]
                        },
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });
                const data = await res.json();
                return data.candidates[0].content.parts[0].text;
            } catch (e) {
                return "Maaf, koneksi saya sedang terganggu.";
            }
        }

        // Text-To-Speech dengan Pengaturan Suara Lokal
        function bicara(teks) {
            isSpeaking = true;
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(teks);
            utterance.lang = 'id-ID';
            utterance.rate = 1.1; // Sedikit dipercepat agar respon terasa gesit

            utterance.onstart = () => {
                setEyesState('talking');
                document.getElementById('mouth').classList.add('talking');
            };

            const endSpeech = () => {
                isSpeaking = false;
                document.getElementById('mouth').classList.remove('talking');
                setEyesState('normal');
                resetSleepTimer();
                startListening();
            };

            utterance.onend = endSpeech;
            utterance.onerror = endSpeech;

            window.speechSynthesis.speak(utterance);
        }

        function setEyesState(state) {
            const leftEye = document.getElementById('leftEye');
            const rightEye = document.getElementById('rightEye');
            
            leftEye.className = 'eye';
            rightEye.className = 'eye';

            if (state === 'talking') {
                leftEye.classList.add('talking');
                rightEye.classList.add('talking');
            } else if (state === 'thinking') {
                leftEye.classList.add('thinking');
                rightEye.classList.add('thinking');
            }
        }

        window.addEventListener('load', () => {
            resetSleepTimer();
            startListening();
        });
    </script>
</body>
</html>
