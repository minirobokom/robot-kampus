<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Kiosk Kampus Standby</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0d1117;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .face-container {
            display: flex;
            gap: 60px;
            margin-bottom: 40px;
        }

        .eye {
            width: 150px;
            height: 150px;
            background-color: #3fb950;
            border-radius: 50%;
            box-shadow: 0 0 35px #3fb950;
            transition: all 0.2s ease;
        }

        .eye.blink {
            height: 10px;
            margin-top: 70px;
        }

        .eye.talking {
            animation: pulse 0.4s infinite alternate;
            background-color: #58a6ff;
            box-shadow: 0 0 50px #58a6ff;
        }

        .eye.thinking {
            background-color: #d29922;
            box-shadow: 0 0 35px #d29922;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }

        .status-box {
            text-align: center;
            max-width: 85%;
            min-height: 100px;
        }

        .status-text {
            font-size: 1.3rem;
            color: #8b949e;
            margin-bottom: 12px;
        }

        .response-text {
            font-size: 1.6rem;
            color: #58a6ff;
            font-weight: bold;
        }

        .mic-indicator {
            position: fixed;
            bottom: 20px;
            font-size: 0.9rem;
            color: #3fb950;
            background: rgba(255,255,255,0.05);
            padding: 6px 16px;
            border-radius: 20px;
        }
    </style>
</head>
<body onclick="startListening()">

    <div class="face-container">
        <div class="eye" id="leftEye"></div>
        <div class="eye" id="rightEye"></div>
    </div>

    <div class="status-box">
        <div class="status-text" id="statusText">Mendengarkan... Silakan langsung berbicara.</div>
        <div class="response-text" id="responseText"></div>
    </div>

    <div class="mic-indicator" id="micStatus">🟢 MIKROFON STANDBY (ALWAYS ON)</div>

    <script>
        const GEMINI_API_KEY = "PASTE_GEMINI_API_KEY_ANDA_DI_SINI";
        const SHEETS_LINK = "PASTE_LINK_GOOGLE_SHEETS_ANDA_DI_SINI";

        let faqData = [];
        let isSpeaking = false;
        let recognition;
        let isRecognizing = false;

        // Auto Berkedip
        setInterval(() => {
            if (!isSpeaking) {
                const eyes = document.querySelectorAll('.eye');
                eyes.forEach(e => e.classList.add('blink'));
                setTimeout(() => eyes.forEach(e => e.classList.remove('blink')), 200);
            }
        }, 4000);

        // Fetch Sheets Data
        async function loadGoogleSheetsData() {
            try {
                const sheetId = SHEETS_LINK.match(/\/d\/([a-zA-Z0-9-_]+)/)[1];
                const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;
                const response = await fetch(csvUrl);
                const text = await response.text();
                const rows = text.split('\n').slice(1);
                faqData = rows.map(row => {
                    const cols = row.split('","').map(c => c.replace(/"/g, '').trim());
                    return { keywords: cols[0] ? cols[0].toLowerCase().split(',') : [], answer: cols[1] || "" };
                });
            } catch (err) {}
        }
        loadGoogleSheetsData();

        // Inisialisasi Speech Recognition
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'id-ID';
            recognition.continuous = false; // Menggunakan false + auto restart agar jauh lebih stabil di Android!
            recognition.interimResults = false;

            recognition.onstart = () => {
                isRecognizing = true;
                if (!isSpeaking) setEyesState('listening');
            };

            recognition.onresult = async (event) => {
                if (isSpeaking) return;
                const userSpeech = event.results[0][0].transcript.trim();

                if (userSpeech.length > 1) {
                    document.getElementById('statusText').innerText = `Mendengar: "${userSpeech}"`;
                    await prosesPertanyaan(userSpeech);
                }
            };

            recognition.onend = () => {
                isRecognizing = false;
                // Otomatis restart mikrofon jika robot sedang tidak bicara
                if (!isSpeaking) {
                    setTimeout(startListening, 300);
                }
            };

            recognition.onerror = (e) => {
                isRecognizing = false;
                if (!isSpeaking) {
                    setTimeout(startListening, 500);
                }
            };
        }

        function startListening() {
            if (SpeechRecognition && !isRecognizing && !isSpeaking) {
                try {
                    recognition.start();
                } catch (e) {}
            }
        }

        // Heartbeat Monitor (Memastikan Mikrofon Tidak Pernah 'Mati' / Bisu)
        setInterval(() => {
            if (!isSpeaking && !isRecognizing) {
                startListening();
            }
        }, 1500);

        async function prosesPertanyaan(inputTeks) {
            setEyesState('thinking');
            document.getElementById('responseText').innerText = "Mencari jawaban...";
            const inputLower = inputTeks.toLowerCase();

            let jawaban = null;
            for (let item of faqData) {
                for (let kw of item.keywords) {
                    if (kw.trim() !== "" && inputLower.includes(kw.trim())) {
                        jawaban = item.answer;
                        break;
                    }
                }
                if (jawaban) break;
            }

            if (!jawaban) {
                jawaban = await tanyaGemini(inputTeks);
            }

            document.getElementById('responseText').innerText = jawaban;
            bicara(jawaban);
        }

        async function tanyaGemini(prompt) {
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Jawab singkat maksimal 2 kalimat Bahasa Indonesia: ${prompt}` }] }]
                    })
                });
                const data = await res.json();
                return data.candidates[0].content.parts[0].text;
            } catch (e) {
                return "Maaf, koneksi Gemini terganggu.";
            }
        }

        function bicara(teks) {
            isSpeaking = true;
            try { recognition.stop(); } catch(e){}

            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(teks);
            utterance.lang = 'id-ID';
            utterance.rate = 1.0;

            utterance.onstart = () => {
                setEyesState('talking');
            };

            utterance.onend = () => {
                isSpeaking = false;
                setEyesState('listening');
                document.getElementById('statusText').innerText = "Mendengarkan... Silakan langsung berbicara.";
                setTimeout(startListening, 400);
            };

            utterance.onerror = () => {
                isSpeaking = false;
                setEyesState('listening');
                setTimeout(startListening, 400);
            };

            window.speechSynthesis.speak(utterance);
        }

        function setEyesState(state) {
            const leftEye = document.getElementById('leftEye');
            const rightEye = document.getElementById('rightEye');
            
            leftEye.className = 'eye';
            rightEye.className = 'eye';

            if (state === 'talking') {
                leftEye.classList.add('talking');
                rightEye.classList.add('talking');
            } else if (state === 'thinking') {
                leftEye.classList.add('thinking');
                rightEye.classList.add('thinking');
            }
        }

        window.addEventListener('load', () => {
            startListening();
        });
    </script>
</body>
    </html>
