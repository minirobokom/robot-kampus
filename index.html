<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Kiosk Kampus</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #05070a;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
            transition: opacity 0.8s ease;
        }

        /* Container Wajah Robot */
        .robot-face {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 50px;
        }

        /* Container Mata */
        .eyes-container {
            display: flex;
            gap: 70px;
        }

        /* Desain Mata */
        .eye {
            width: 140px;
            height: 140px;
            background-color: #3fb950;
            border-radius: 50%;
            box-shadow: 0 0 40px #3fb950;
            transition: all 0.4s ease;
        }

        /* Animasi Berkedip Otomatis */
        .eye.blink {
            height: 8px !important;
            margin-top: 66px;
        }

        /* Mode Sleep / Standby: Mata Menyipit */
        body.sleep .eye {
            height: 16px;
            border-radius: 20px;
            margin-top: 62px;
            background-color: #238636;
            box-shadow: 0 0 15px #238636;
        }

        body.sleep {
            opacity: 0.35;
        }

        /* Warna Mata Saat Robot Bicara */
        .eye.talking {
            background-color: #58a6ff;
            box-shadow: 0 0 50px #58a6ff;
        }

        /* Warna Mata Saat Berpikir */
        .eye.thinking {
            background-color: #d29922;
            box-shadow: 0 0 40px #d29922;
        }

        /* Desain Mulut Robot */
        .mouth {
            width: 100px;
            height: 12px;
            background-color: #58a6ff;
            border-radius: 10px;
            box-shadow: 0 0 20px #58a6ff;
            transition: all 0.1s ease;
            opacity: 0.3;
        }

        /* Animasi Mulut Mengikuti Ucapan Suara */
        .mouth.talking {
            opacity: 1;
            animation: mouthMove 0.25s infinite alternate ease-in-out;
        }

        @keyframes mouthMove {
            0% {
                height: 10px;
                width: 90px;
                border-radius: 10px;
            }
            100% {
                height: 60px;
                width: 120px;
                border-radius: 30px;
            }
        }
    </style>
</head>
<body onclick="wakeUp()">

    <div class="robot-face">
        <!-- Mata Kiri & Kanan -->
        <div class="eyes-container">
            <div class="eye" id="leftEye"></div>
            <div class="eye" id="rightEye"></div>
        </div>
        <!-- Mulut Animasi -->
        <div class="mouth" id="mouth"></div>
    </div>

    <script>
        // MASUKKAN API KEY GEMINI & LINK GOOGLE SHEETS ANDA
        const GEMINI_API_KEY = "AQ.Ab8RN6LDiFqp7a_ZycxNTO9ifxlGW29DsBmvFrFM9zeaJ_getg";
        const SHEETS_LINK = "https://docs.google.com/spreadsheets/d/1rpHS6-a4M4IYE5Oq_z5hg6ybUKLjdnNJwqdv1Wkfxj0/edit?usp=sharing";

        let faqData = [];
        let isSpeaking = false;
        let sleepTimer;

        // Auto Berkedip Mata
        setInterval(() => {
            if (!isSpeaking && !document.body.classList.contains('sleep')) {
                const eyes = document.querySelectorAll('.eye');
                eyes.forEach(e => e.classList.add('blink'));
                setTimeout(() => eyes.forEach(e => e.classList.remove('blink')), 200);
            }
        }, 4000);

        // Reset Timer Sleep (Mata Menyipit setelah 15 Detik Hening)
        function resetSleepTimer() {
            document.body.classList.remove('sleep');
            clearTimeout(sleepTimer);
            sleepTimer = setTimeout(() => {
                if (!isSpeaking) {
                    document.body.classList.add('sleep');
                }
            }, 15000);
        }

        function wakeUp() {
            resetSleepTimer();
            startListening();
        }

        // Ambil Data dari Google Sheets
        async function loadGoogleSheetsData() {
            try {
                const sheetId = SHEETS_LINK.match(/\/d\/([a-zA-Z0-9-_]+)/)[1];
                const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;
                const response = await fetch(csvUrl);
                const text = await response.text();
                const rows = text.split('\n').slice(1);
                faqData = rows.map(row => {
                    const cols = row.split('","').map(c => c.replace(/"/g, '').trim());
                    return { keywords: cols[0] ? cols[0].toLowerCase().split(',') : [], answer: cols[1] || "" };
                });
            } catch (err) {}
        }
        loadGoogleSheetsData();

        // Speech Recognition Stabil (Tanpa Suara Bip / Notif Berulang)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'id-ID';
            recognition.continuous = true;
            recognition.interimResults = false;

            recognition.onresult = async (event) => {
                if (isSpeaking) return;
                
                const lastIndex = event.results.length - 1;
                const userSpeech = event.results[lastIndex][0].transcript.trim();

                if (userSpeech.length > 1) {
                    wakeUp();
                    await prosesPertanyaan(userSpeech);
                }
            };

            recognition.onend = () => {
                if (!isSpeaking) {
                    try { recognition.start(); } catch(e){}
                }
            };
        }

        function startListening() {
            if (recognition) {
                try { recognition.start(); } catch(e){}
            }
        }

        // Logika Respon
        async function prosesPertanyaan(inputTeks) {
            setEyesState('thinking');
            const inputLower = inputTeks.toLowerCase();

            let jawaban = null;
            for (let item of faqData) {
                for (let kw of item.keywords) {
                    if (kw.trim() !== "" && inputLower.includes(kw.trim())) {
                        jawaban = item.answer;
                        break;
                    }
                }
                if (jawaban) break;
            }

            if (!jawaban) {
                jawaban = await tanyaGemini(inputTeks);
            }

            bicara(jawaban);
        }

        // Panggil Gemini AI
        async function tanyaGemini(prompt) {
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Jawab singkat maksimal 2 kalimat Bahasa Indonesia: ${prompt}` }] }]
                    })
                });
                const data = await res.json();
                return data.candidates[0].content.parts[0].text;
            } catch (e) {
                return "Maaf, terjadi gangguan koneksi.";
            }
        }

        // Text-To-Speech + Animasi Mulut Bergerak
        function bicara(teks) {
            isSpeaking = true;
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(teks);
            utterance.lang = 'id-ID';
            utterance.rate = 1.0;

            utterance.onstart = () => {
                setEyesState('talking');
                document.getElementById('mouth').classList.add('talking');
            };

            utterance.onend = () => {
                isSpeaking = false;
                document.getElementById('mouth').classList.remove('talking');
                setEyesState('normal');
                resetSleepTimer();
            };

            utterance.onerror = () => {
                isSpeaking = false;
                document.getElementById('mouth').classList.remove('talking');
                setEyesState('normal');
                resetSleepTimer();
            };

            window.speechSynthesis.speak(utterance);
        }

        function setEyesState(state) {
            const leftEye = document.getElementById('leftEye');
            const rightEye = document.getElementById('rightEye');
            
            leftEye.className = 'eye';
            rightEye.className = 'eye';

            if (state === 'talking') {
                leftEye.classList.add('talking');
                rightEye.classList.add('talking');
            } else if (state === 'thinking') {
                leftEye.classList.add('thinking');
                rightEye.classList.add('thinking');
            }
        }

        // Jalankan Pertama Kali
        window.addEventListener('load', () => {
            resetSleepTimer();
            startListening();
        });
    </script>
</body>
    </html>
